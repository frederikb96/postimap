name: postimap-test

services:
  postgres:
    image: docker.io/postgres:16-alpine
    container_name: postimap-pg-test
    ports:
      - "${POSTIMAP_TEST_PG_PORT:-15432}:5432"
    environment:
      POSTGRES_DB: postimap_test
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d postimap_test"]
      interval: 3s
      timeout: 3s
      retries: 10
    volumes:
      - /tmp/postimap-test-pgdata:/var/lib/postgresql/data:Z
    restart: "no"

  stalwart:
    image: docker.io/stalwartlabs/mail-server:v0.11.4
    container_name: postimap-stalwart-test
    ports:
      - "${POSTIMAP_TEST_SMTP_PORT:-11025}:2525"
      - "${POSTIMAP_TEST_IMAP_PORT:-11143}:1143"
      - "${POSTIMAP_TEST_STALWART_ADMIN_PORT:-18880}:8080"
    environment:
      STALWART_ADMIN_PASSWORD: testadmin123
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8080'"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - /tmp/postimap-test-stalwart:/opt/stalwart-mail:Z
      - ./tests/fixtures/stalwart-test.toml:/opt/stalwart-mail/etc/config.toml:ro,Z
    restart: "no"

  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.9.0
    container_name: postimap-toxiproxy-test
    ports:
      - "${POSTIMAP_TEST_TOXIPROXY_PORT:-8474}:8474"
      - "21000-21010:21000-21010"
      - "23000-23010:23000-23010"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8474/version || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 5
    restart: "no"
