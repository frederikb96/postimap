name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  unit:
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:unit

  integration:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Pre-pull container images
        run: |
          docker pull postgres:16-alpine &
          docker pull stalwartlabs/mail-server:v0.11.4 &
          wait
      - run: npm run test:integration
        env:
          TESTCONTAINERS_RYUK_DISABLED: 'true'

  e2e:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Pre-pull container images
        run: |
          docker pull postgres:16-alpine &
          docker pull stalwartlabs/mail-server:v0.11.4 &
          wait
      - run: npm run test:e2e
        env:
          TESTCONTAINERS_RYUK_DISABLED: 'true'

  chaos:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Pre-pull container images
        run: |
          docker pull postgres:16-alpine &
          docker pull stalwartlabs/mail-server:v0.11.4 &
          docker pull ghcr.io/shopify/toxiproxy:2.9.0 &
          wait
      - run: npm run test:chaos
        env:
          TESTCONTAINERS_RYUK_DISABLED: 'true'

  property:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Pre-pull container images
        run: |
          docker pull postgres:16-alpine &
          docker pull stalwartlabs/mail-server:v0.11.4 &
          wait
      - run: npm run test:property
        env:
          TESTCONTAINERS_RYUK_DISABLED: 'true'
